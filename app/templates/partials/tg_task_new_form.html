{# Фрагмент «Новая задача-поручение» для HTMX-модалки (#newTaskModal). #}
<form hx-post="{{ url_for('main.api_tg_task_create') }}"
      hx-swap="none"
      class="p-3">
    <div class="mb-3">
        <label class="form-label fw-bold">Суть задачи *</label>
        <input type="text" name="title" class="form-control" required maxlength="200"
               placeholder="Например: Подготовить отгрузку ИП Леонидов">
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Подробно</label>
        <textarea name="details" class="form-control" rows="3"
                  placeholder="Что именно надо сделать, комментарии, контекст"></textarea>
    </div>

    <div class="row g-2 mb-3">
        <div class="col-12 col-md-7">
            <label class="form-label fw-bold">Исполнитель</label>
            <select name="assignee_id" class="form-select">
                <option value="">— не указан (на отдел) —</option>
                {% for u in users %}
                    <option value="{{ u.id }}">{{ u.username }} ({{ u.role }})</option>
                {% endfor %}
            </select>
            <div class="form-text">Если выбран конкретный человек — задача придёт ему лично.</div>
        </div>
        <div class="col-12 col-md-5">
            <label class="form-label fw-bold">или отдел</label>
            <select name="assignee_role" class="form-select">
                <option value="">— любой —</option>
                {% for r in roles %}
                    <option value="{{ r }}">{{ r }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="row g-2 mb-3">
        <div class="col-12 col-md-6">
            <label class="form-label fw-bold">Срок выполнения</label>
            <input type="date" name="deadline" class="form-control" value="{{ default_deadline }}">
            <div class="form-text">Если пусто — автоматически «завтра».</div>
        </div>
        <div class="col-12 col-md-6">
            <label class="form-label fw-bold">Тип</label>
            <select name="action_type" class="form-select">
                {% for at in action_types %}
                    <option value="{{ at }}" {% if at == 'info' %}selected{% endif %}>{{ at }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="d-flex justify-content-end gap-2 pt-2 border-top">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Отмена</button>
        <button type="submit" class="btn btn-success fw-bold">
            <i class="fas fa-plus me-1"></i> Создать задачу
        </button>
    </div>
</form>
