{% extends "base.html" %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center text-center" style="min-height: 60vh;">
    <div class="mb-4 text-secondary">
        <i class="fas fa-wifi fa-5x"></i>
        <i class="fas fa-slash fa-2x text-danger" style="position: relative; left: -30px; top: 10px;"></i>
    </div>
    <h3 class="fw-bold text-dark">Нет связи с сервером</h3>
    <p class="text-muted" style="max-width: 300px;">
        Вы находитесь в офлайн-режиме. <br>
        Эта страница не была сохранена в памяти вашего устройства.
    </p>
    <div class="d-grid gap-2 col-8 col-md-4">
        <button onclick="window.location.reload()" class="btn btn-success fw-bold shadow-sm">
            <i class="fas fa-sync-alt me-2"></i> Попробовать снова
        </button>
        <a href="{{ url_for('orders.orders_list') }}" class="btn btn-outline-secondary">
            На главную (может быть доступна)
        </a>
    </div>
</div>
{% endblock %}
