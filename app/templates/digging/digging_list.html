{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <h4 class="mb-3 fw-bold text-center">🚜 Выкопка: Выберите заказ</h4>
        
        <div class="list-group">
            {% for o in orders %}
            <a href="{{ url_for('digging.mobile_order', order_id=o.id) }}" class="list-group-item list-group-item-action py-3 border-0 shadow-sm mb-2 rounded">
                <div class="d-flex w-100 justify-content-between align-items-center">
                    <div>
                        <h5 class="mb-1 text-primary fw-bold">{{ o.client.name }}</h5>
                        <small class="text-muted">Заказ #{{ o.id }} от {{ o.date.strftime('%d.%m') }}</small>
                    </div>
                    <span class="badge bg-light text-dark border">
                        <i class="fas fa-chevron-right"></i>
                    </span>
                </div>
            </a>
            {% else %}
            <div class="text-center text-muted py-5">
                Нет активных заказов
            </div>
            {% endfor %}
        </div>
        
        <div class="mt-4 text-center">
            <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">Вернуться в меню</a>
        </div>
    </div>
</div>
{% endblock %}
